<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jam Sprint Trainer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-950 text-gray-100 antialiased selection:bg-gray-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // ─── CONSTANTS & CONFIGURATIONS ───

        // Fallback data structure if the external themes.json fails to load
        const EMPTY_BANK = { "GMTK": { themes:[], constraints:[], wildcards:[], engines:[] } };
        
        // Helper functions for formatting the stopwatch time (seconds -> HH:MM:SS)
        const pad = n => String(n).padStart(2, "0");
        const fmtTime = s => `${pad(Math.floor(s / 3600))}:${pad(Math.floor((s % 3600) / 60))}:${pad(s % 60)}`;

        // Sprint phases mapping minutes to specific design stages
        const PHASES = [
          { label: "Planning", start: 0,   end: 20,  dot: "bg-blue-400",   txt: "text-blue-400"   },
          { label: "Setup",    start: 20,  end: 40,  dot: "bg-purple-400", txt: "text-purple-400" },
          { label: "Build",    start: 40,  end: 140, dot: "bg-green-400",  txt: "text-green-400"  },
          { label: "Polish",   start: 140, end: 165, dot: "bg-yellow-400", txt: "text-yellow-400" },
          { label: "Debrief",  start: 165, end: 180, dot: "bg-red-400",    txt: "text-red-400"    },
        ];

        // Color mapping for different game jam styles
        const BADGE = {
          "GMTK":           "bg-orange-600 text-orange-100",
          "Brackeys":       "bg-blue-600 text-blue-100",
          "Godot Wild Jam": "bg-purple-700 text-purple-100",
          "Pure Chaos":     "bg-red-700 text-red-100",
        };

        // ─── MAIN APPLICATION COMPONENT ───
        function App() {
          // --- UI Navigation State ---
          const [tab, setTab] = useState("brief"); // "brief", "stopwatch", or "log"
          
          // --- External Data State ---
          const [cloudBank, setCloudBank]   = useState(null); // Data loaded from themes.json
          const [loading, setLoading]       = useState(true);
          const [showCustom, setShowCustom] = useState(false); // Toggles the custom input drawer

          // --- Custom Input Form State ---
          const [cStyle, setCStyle] = useState("GMTK");
          const [cType, setCType]   = useState("themes");
          const [cValue, setCValue] = useState("");

          // --- Session Core State ---
          const [style, setStyle]     = useState("GMTK"); // Currently selected jam style
          const [brief, setBrief]     = useState(null);   // The currently rolled randomized prompt
          const [rerolls, setRerolls] = useState(1);      // Number of allowed rerolls per session
          const [form, setForm]       = useState({ worked: "", broke: "", differently: "" }); // Debrief log form
          const [running, setRunning] = useState(false);  // Stopwatch execution state

          // --- Lazy Initialized Local Storage States ---
          // Using lazy initialization (passing a function) ensures `localStorage.getItem` 
          // only runs once on the initial mount, improving performance.
          
          const [localBank, setLocalBank] = useState(() => {
            return JSON.parse(localStorage.getItem("jam_local_customs") || "{}");
          });
          
          const [sessions, setSessions] = useState(() => {
            return JSON.parse(localStorage.getItem("jam_sessions") || "[]");
          });
          
          const [elapsed, setElapsed] = useState(() => {
            return parseInt(localStorage.getItem("jam_stopwatch_elapsed") || "0", 10);
          });
          
          // 'locked' holds the brief currently being worked on, preventing it from 
          // changing if the user clicks around during an active sprint.
          const [locked, setLocked] = useState(() => {
            const saved = localStorage.getItem("jam_current_brief");
            return saved ? JSON.parse(saved) : null;
          });

          // ─── DATA PROCESSING ENGINE ───

          /**
           * Merges the base JSON data with the user's custom LocalStorage data.
           * CRITICAL FIX: Deep clones arrays to prevent direct mutation of the cloudBank 
           * state, which would otherwise crash React's rendering fiber tree.
           */
          const getMergedBank = () => {
            const base = cloudBank || EMPTY_BANK;
            const merged = {};
            
            // Step 1: Deep clone the base dataset structure
            Object.keys(base).forEach(st => {
              merged[st] = {
                themes: [...(base[st]?.themes || [])],
                constraints: [...(base[st]?.constraints || [])],
                wildcards: [...(base[st]?.wildcards || [])],
                engines: [...(base[st]?.engines || [])]
              };
            });
            
            // Step 2: Append custom entries from local storage into the cloned structure
            Object.keys(localBank).forEach(st => {
              if (!merged[st]) {
                merged[st] = { themes: [], constraints: [], wildcards: [], engines: [] };
              }
              Object.keys(localBank[st]).forEach(type => {
                if (Array.isArray(localBank[st][type])) {
                  // Merge using the spread operator for immutability
                  merged[st][type] = [...merged[st][type], ...localBank[st][type]];
                }
              });
            });
            return merged;
          };

          const BANK = getMergedBank();
          const STYLES = Object.keys(BANK);

          // Helper to pick a random item from an array
          const pick = arr => (arr && arr.length ? arr[Math.floor(Math.random() * arr.length)] : "N/A");
          
          // Generates a random game jam brief based on the selected style
          const mkBrief = (targetStyle) => {
            const pool = getMergedBank()[targetStyle] || { themes:[], constraints:[], wildcards:[], engines:[] };
            return {
              style: targetStyle,
              theme: pick(pool.themes),
              constraint: pick(pool.constraints),
              wildcard: pick(pool.wildcards),
              engine: pick(pool.engines)
            };
          };

          // ─── REACT LIFECYCLE HOOKS ───

          // Hook 1: Fetch the core database on mount
          useEffect(() => {
            fetch('./themes.json')
              .then(res => {
                if (!res.ok) throw new Error("Configuration bank missing.");
                return res.json();
              })
              .then(data => {
                setCloudBank(data);
                const initialStyle = Object.keys(data)[0] || "GMTK";
                setStyle(initialStyle);
                setLoading(false);
              })
              .catch(err => {
                console.warn("Failing back to core sandbox map. Context:", err.message);
                setCloudBank(EMPTY_BANK);
                setLoading(false);
              });
          }, []);

          // Hook 2: Generate the initial brief once data finishes loading
          useEffect(() => {
            if (!loading && !brief && STYLES.length) {
              setBrief(mkBrief(style));
            }
          }, [loading]);

          // Hooks 3-6: Persistent Storage Synchronization
          // These hooks automatically save state changes to the browser's memory
          useEffect(() => { localStorage.setItem("jam_sessions", JSON.stringify(sessions)); }, [sessions]);
          useEffect(() => { localStorage.setItem("jam_stopwatch_elapsed", elapsed.toString()); }, [elapsed]);
          useEffect(() => { localStorage.setItem("jam_local_customs", JSON.stringify(localBank)); }, [localBank]);
          useEffect(() => {
            if (locked) localStorage.setItem("jam_current_brief", JSON.stringify(locked));
            else localStorage.removeItem("jam_current_brief");
          }, [locked]);

          // Hook 7: Stopwatch Interval Ticker
          useEffect(() => {
            let ticker;
            if (running) { 
                // Increment elapsed seconds by 1 every 1000ms
                ticker = setInterval(() => setElapsed(e => e + 1), 1000); 
            }
            return () => { if (ticker) clearInterval(ticker); }; // Cleanup on unmount/pause
          }, [running]);

          // ─── DERIVED STATE & EVENT HANDLERS ───

          const mins = elapsed / 60;
          const phaseIdx = PHASES.findIndex(p => mins >= p.start && mins < p.end);
          const curPhase = PHASES[phaseIdx];
          
          // Display the locked brief if a session is active, otherwise the temporary brief
          const displayBrief = locked ?? brief;

          const newBrief = () => { if (!locked) { setBrief(mkBrief(style)); setRerolls(1); } };
          const doReroll = () => { if (!locked && rerolls > 0) { setBrief(mkBrief(style)); setRerolls(0); } };
          const onStyle  = s => { if (!locked) { setStyle(s); setBrief(mkBrief(s)); setRerolls(1); } };
          
          const startSession = () => { setLocked(brief); setElapsed(0); setRunning(true); setTab("stopwatch"); };
          const doBreak      = () => { setRunning(false); localStorage.setItem("jam_stopwatch_elapsed", elapsed.toString()); };
          const doReset      = () => { setRunning(false); setElapsed(0); setLocked(null); setRerolls(1); };

          /**
           * Saves the current session logs to history and clears the board.
           */
          const saveSession = () => {
            if (!form.worked && !form.broke && !form.differently) return;
            const entry = {
              id: Date.now(),
              date: new Date().toLocaleString("en-IN", { dateStyle: "medium", timeStyle: "short" }),
              brief: locked ?? brief,
              ...form,
            };
            setSessions(prev => [entry, ...prev]);
            setForm({ worked: "", broke: "", differently: "" });
            doReset();
            setTab("log");
          };

          /**
           * Removes a specific session by its unique ID.
           */
          const deleteSession = (id) => {
            setSessions(prev => prev.filter(s => s.id !== id));
          };

          /**
           * Safely adds a user's custom prompt element into state.
           * Utilizes functional state updates (`prev => ...`) to ensure immutability.
           */
          const injectLocalPrompt = (e) => {
            e.preventDefault();
            const trimmed = cValue.trim();
            if (!trimmed) return;

            setLocalBank(prev => {
              const currentStyleData = prev[cStyle] || { themes: [], constraints: [], wildcards: [], engines: [] };
              const currentTypeArray = currentStyleData[cType] || [];
              
              if (currentTypeArray.includes(trimmed)) return prev; // Avoid duplicates

              return {
                ...prev,
                [cStyle]: {
                  ...currentStyleData,
                  [cType]: [...currentTypeArray, trimmed]
                }
              };
            });

            setCValue(""); // Reset input field
          };

          /**
           * Safely removes a user's custom prompt element from state.
           * Cleans up empty parent objects if the last item in a category is deleted.
           */
          const removeLocalItem = (targetStyle, targetType, valueToRemove) => {
            setLocalBank(prev => {
              if (!prev[targetStyle] || !prev[targetStyle][targetType]) return prev;
              
              const updatedArray = prev[targetStyle][targetType].filter(item => item !== valueToRemove);
              const updatedStyleData = { ...prev[targetStyle], [targetType]: updatedArray };
              
              // Clean up empty arrays
              if (updatedArray.length === 0) {
                delete updatedStyleData[targetType];
              }
              
              const updatedBank = { ...prev, [targetStyle]: updatedStyleData };
              // Clean up empty style objects
              if (Object.keys(updatedStyleData).length === 0) {
                delete updatedBank[targetStyle];
              }
              
              return updatedBank;
            });
          };

          const hasLocalItems = Object.keys(localBank).some(st => 
            Object.keys(localBank[st]).some(type => localBank[st][type]?.length > 0)
          );

          // ─── RENDER ───

          // Loading Screen
          if (loading || !brief) {
            return (
              <div className="min-h-screen bg-gray-950 flex items-center justify-center font-mono text-xs text-gray-600">
                ⚡ Synchronizing operational databanks...
              </div>
            );
          }

          return (
            <div className="min-h-screen bg-gray-950 text-gray-100 antialiased selection:bg-gray-800">
              <div className="max-w-lg mx-auto px-4 py-8 pb-16">

                {/* --- HEADER --- */}
                <div className="mb-6 flex justify-between items-start">
                  <div>
                    <h1 className="text-lg font-bold tracking-tight text-white">Jam Sprint Trainer</h1>
                    <p className="text-gray-600 text-xs mt-0.5">3-hour mechanic sprint · remote + local systems</p>
                  </div>
                  {locked && (
                    <span className="text-[10px] bg-emerald-950 border border-emerald-800 text-emerald-400 px-2 py-0.5 rounded font-mono animate-pulse font-bold tracking-wider">
                      SPRINT LOCKED
                    </span>
                  )}
                </div>

                {/* --- NAVIGATION TABS --- */}
                <div className="flex gap-0.5 mb-6 p-1 bg-gray-900 rounded-lg border border-gray-800">
                  {[["brief","Brief"],["stopwatch","Timer"],["log","Session log"]].map(([k, l]) => (
                    <button key={k} onClick={() => setTab(k)}
                      className={`flex-1 py-1.5 text-xs font-medium rounded-md transition-all ${
                        tab === k ? "bg-gray-700 text-white shadow-sm" : "text-gray-500 hover:text-gray-300"
                      }`}>
                      {l}
                    </button>
                  ))}
                </div>

                {/* --- TAB 1: MODULE BRIEF SHEET --- */}
                {tab === "brief" && (
                  <div className="space-y-3">
                    {/* Style Selector */}
                    <select value={displayBrief.style} onChange={e => onStyle(e.target.value)} disabled={!!locked}
                      className="w-full bg-gray-900 border border-gray-800 text-gray-200 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-1 focus:ring-gray-700 disabled:opacity-40 disabled:cursor-not-allowed">
                      {STYLES.map(s => <option key={s} value={s}>{s} style</option>)}
                    </select>

                    {/* Brief Control Buttons */}
                    <div className="flex items-center gap-2">
                      <button onClick={newBrief} disabled={!!locked}
                        className="flex items-center gap-1 px-3 py-2 bg-gray-900 hover:bg-gray-800 border border-gray-800 text-gray-300 text-xs rounded-lg transition-colors disabled:opacity-40 disabled:cursor-not-allowed">
                        ↻ New brief
                      </button>
                      <button onClick={doReroll} disabled={!!locked || rerolls === 0}
                        className={`flex items-center gap-1 px-3 py-2 text-xs rounded-lg border transition-colors ${
                          !locked && rerolls > 0
                            ? "bg-gray-900 hover:bg-gray-800 border-gray-800 text-gray-300"
                            : "bg-transparent border-gray-900 text-gray-700 cursor-not-allowed opacity-40"
                        }`}>
                        ⊟ Reroll ({locked ? 0 : rerolls} left)
                      </button>
                      
                      {!locked ? (
                        <button onClick={startSession}
                          className="ml-auto px-3 py-2 bg-white text-gray-900 text-xs font-bold rounded-lg hover:bg-gray-100 transition-colors">
                          ▶ Start session ↗
                        </button>
                      ) : (
                        <button onClick={() => setTab("stopwatch")}
                          className="ml-auto px-3 py-2 bg-emerald-600 text-white text-xs font-bold rounded-lg hover:bg-emerald-500 transition-colors">
                          ⏱ View Active Clock
                        </button>
                      )}
                    </div>

                    {/* PRESENTATION DISPLAY CARD */}
                    <div className="bg-gray-900 border border-gray-800 rounded-xl p-5 space-y-4 relative overflow-hidden">
                      {locked && (
                        <div className="absolute top-0 left-0 right-0 h-1 bg-gradient-to-r from-emerald-500 via-teal-500 to-emerald-500"></div>
                      )}
                      <span className={`inline-flex px-2.5 py-0.5 rounded-full text-xs font-semibold ${BADGE[displayBrief.style] ?? "bg-gray-800"}`}>
                        {displayBrief.style} style {locked && " (Locked)"}
                      </span>
                      <div>
                        <p className="text-xs font-semibold uppercase tracking-widest text-gray-600 mb-1.5">Theme</p>
                        <p className="text-4xl font-black text-white leading-none tracking-tight">{displayBrief.theme}</p>
                      </div>
                      <div>
                        <p className="text-xs font-semibold uppercase tracking-widest text-gray-600 mb-1.5">Mechanical Constraint</p>
                        <p className="text-sm text-gray-200 leading-relaxed">{displayBrief.constraint}</p>
                      </div>
                      <div>
                        <p className="text-xs font-semibold uppercase tracking-widest text-gray-600 mb-1.5">Wildcard</p>
                        <p className="text-sm text-gray-400 italic leading-relaxed">{displayBrief.wildcard}</p>
                      </div>
                      <div>
                        <p className="text-xs font-semibold uppercase tracking-widest text-gray-600 mb-1.5">Suggested Engine</p>
                        <p className="text-sm font-medium text-gray-300">{displayBrief.engine}</p>
                      </div>
                    </div>

                    {/* CONFIG DRAWER PANEL FOR CUSTOM DATA */}
                    {!locked && (
                      <div className="pt-2">
                        <button onClick={() => setShowCustom(!showCustom)} 
                          className="text-xs text-gray-500 hover:text-gray-300 flex items-center gap-1 transition-colors font-medium">
                          {showCustom ? "▼ Hide custom data engine" : "▶ ＋ Add/Remove custom prompt elements (Local Storage)"}
                        </button>
                        
                        {showCustom && (
                          <div className="mt-3 bg-gray-900 border border-gray-800 rounded-xl p-4 space-y-4">
                            {/* Data Injection Form */}
                            <form onSubmit={injectLocalPrompt} className="space-y-3">
                              <div className="grid grid-cols-2 gap-2">
                                <div>
                                  <label className="block text-[10px] uppercase font-bold text-gray-500 mb-1">Target Style</label>
                                  <select value={cStyle} onChange={e => setCStyle(e.target.value)} className="w-full bg-gray-950 border border-gray-800 rounded px-2 py-1 text-xs text-gray-300 focus:outline-none">
                                    {STYLES.map(s => <option key={s} value={s}>{s}</option>)}
                                  </select>
                                </div>
                                <div>
                                  <label className="block text-[10px] uppercase font-bold text-gray-500 mb-1">Data Type</label>
                                  <select value={cType} onChange={e => setCType(e.target.value)} className="w-full bg-gray-950 border border-gray-800 rounded px-2 py-1 text-xs text-gray-300 focus:outline-none">
                                    <option value="themes">Theme</option>
                                    <option value="constraints">Constraint</option>
                                    <option value="wildcards">Wildcard</option>
                                    <option value="engines">Engine</option>
                                  </select>
                                </div>
                              </div>
                              <div>
                                <label className="block text-[10px] uppercase font-bold text-gray-500 mb-1">Prompt Content String</label>
                                <input type="text" value={cValue} onChange={e => setCValue(e.target.value)} placeholder="Type prompt variation text details..." className="w-full bg-gray-950 border border-gray-800 rounded px-3 py-1.5 text-xs text-white placeholder-gray-800 focus:outline-none focus:border-gray-700" />
                              </div>
                              <button type="submit" className="w-full py-1.5 bg-gray-800 hover:bg-gray-700 text-white font-semibold text-xs rounded transition-colors">
                                Inject Local Item
                              </button>
                            </form>

                            {/* ACTIVE LOCAL INJECTIONS RETRIEVAL VIEW (Only shows if data exists) */}
                            {hasLocalItems && (
                              <div className="border-t border-gray-800/80 pt-3 space-y-2">
                                <p className="text-[10px] uppercase font-bold text-gray-500 tracking-wider">Active Local Injections</p>
                                <div className="max-h-44 overflow-y-auto space-y-1.5 pr-1 divide-y divide-gray-850">
                                  {Object.keys(localBank).map(st => 
                                    Object.keys(localBank[st]).map(type => 
                                      (localBank[st][type] || []).map(item => (
                                        <div key={`${st}-${type}-${item}`} className="flex items-center justify-between bg-gray-950/60 px-2.5 py-2 rounded border border-gray-800/40 text-xs gap-4 group">
                                          <div className="flex flex-col min-w-0">
                                            <span className="text-gray-200 font-medium break-words leading-snug">{item}</span>
                                            <span className="text-[9px] text-gray-600 uppercase font-mono mt-0.5 tracking-wide">{st} · {type.slice(0, -1)}</span>
                                          </div>
                                          <button type="button" 
                                            onClick={() => removeLocalItem(st, type, item)}
                                            className="text-gray-600 hover:text-red-400 font-bold px-1 py-0.5 transition-colors text-sm"
                                            title="Delete entry">
                                            ✕
                                          </button>
                                        </div>
                                      ))
                                    )
                                  )}
                                </div>
                              </div>
                            )}
                          </div>
                        )}
                      </div>
                    )}
                  </div>
                )}

                {/* --- TAB 2: SPRINT TRACKING TIMER --- */}
                {tab === "stopwatch" && (
                  <div className="space-y-4">
                    {/* Active Target Readout */}
                    {locked ? (
                      <div className="bg-gray-900 border border-gray-800 rounded-xl px-4 py-3">
                        <div className="flex items-center gap-2 mb-1.5">
                          <span className={`text-xs font-semibold px-2 py-0.5 rounded-full ${BADGE[locked.style] ?? "bg-gray-800"}`}>{locked.style}</span>
                          <span className="text-gray-600 text-[11px]">Locked Target Sprint Parameters</span>
                        </div>
                        <p className="text-sm font-bold text-white">{locked.theme}</p>
                        <p className="text-gray-400 text-xs mt-0.5 leading-relaxed">{locked.constraint}</p>
                      </div>
                    ) : (
                      <div className="bg-gray-900/40 border border-dashed border-gray-800 rounded-xl p-4 text-center">
                        <p className="text-xs text-gray-500">No active tracking lock established. Processing sandbox defaults.</p>
                      </div>
                    )}

                    {/* Giant Clock Face */}
                    <div className="text-center py-8">
                      <p className="text-6xl font-mono font-bold text-white tracking-wider tabular-nums select-none">{fmtTime(elapsed)}</p>
                      <div className="mt-3 h-5 flex items-center justify-center">
                        {elapsed === 0 && !running ? (
                          <span className="text-xs text-gray-700">Awaiting runtime lock triggers...</span>
                        ) : curPhase ? (
                          <span className={`text-xs font-medium ${curPhase.txt}`}>● {curPhase.label} Stage Active</span>
                        ) : (
                          <span className="text-xs text-red-400">● 3-Hour Hard Session Deadline Exceeded</span>
                        )}
                      </div>
                    </div>

                    {/* Timer Controls */}
                    <div className="flex gap-2 justify-center">
                      {running ? (
                        <button onClick={doBreak} className="px-8 py-2.5 bg-amber-500 text-gray-950 text-sm font-bold rounded-lg hover:bg-amber-400 transition-colors">
                          ☕ Take a Break
                        </button>
                      ) : (
                        <button onClick={() => setRunning(true)} className="px-8 py-2.5 bg-white text-gray-900 text-sm font-bold rounded-lg hover:bg-gray-100 transition-colors">
                          {elapsed > 0 ? "▶ Resume" : "▶ Start Sprint"}
                        </button>
                      )}
                      <button onClick={doReset} className="px-5 py-2.5 bg-gray-900 hover:bg-gray-800 border border-gray-800 text-gray-600 hover:text-red-400 transition-colors text-sm rounded-lg">
                        ↺ Reset
                      </button>
                    </div>

                    {/* Timeline Tracker UI */}
                    <div className="bg-gray-900 border border-gray-800 rounded-xl p-4">
                      <p className="text-xs font-semibold uppercase tracking-widest text-gray-600 mb-3">Sprint Phases Matrix</p>
                      <div className="space-y-0.5">
                        {PHASES.map((p, i) => {
                          const active = i === phaseIdx;
                          const done   = mins >= p.end;
                          return (
                            <div key={p.label} className={`flex items-center gap-3 px-2.5 py-2 rounded-lg transition-all ${active ? "bg-gray-800/80" : ""}`}>
                              <div className={`w-1.5 h-1.5 rounded-full flex-shrink-0 ${active ? p.dot : done ? "bg-gray-700" : "bg-gray-800 border border-gray-700"}`} />
                              <span className={`flex-1 text-sm ${active ? "text-white font-semibold" : done ? "text-gray-600 line-through" : "text-gray-500"}`}>{p.label}</span>
                              <span className={`text-xs tabular-nums ${active ? "text-gray-400" : "text-gray-700"}`}>{p.start}–{p.end}m</span>
                            </div>
                          );
                        })}
                      </div>
                    </div>

                    {/* Jump to Logs once session starts */}
                    {elapsed > 0 && (
                      <button onClick={() => setTab("log")} className="w-full py-2.5 bg-gray-900 hover:bg-gray-800 border border-gray-800 text-gray-300 text-sm font-medium rounded-lg transition-colors mt-2">
                        📋 Start debrief & logs
                      </button>
                    )}
                  </div>
                )}

                {/* --- TAB 3: HISTORICAL LOG ARCHIVES --- */}
                {tab === "log" && (
                  <div className="space-y-5">
                    {/* Log Form Wrapper */}
                    <div className="bg-gray-900 border border-gray-800 rounded-xl p-4 space-y-3">
                      <div className="flex items-center justify-between gap-2 flex-wrap border-b border-gray-800 pb-2">
                        <p className="text-xs font-semibold uppercase tracking-widest text-gray-500">New Debrief Entry</p>
                        <span className={`text-[11px] font-bold px-2 py-0.5 rounded ${BADGE[displayBrief.style] ?? "bg-gray-800"}`}>{displayBrief.style}: {displayBrief.theme}</span>
                      </div>

                      {/* Map through the required log questions to generate Textareas */}
                      {[
                        { k: "worked",      q: "What worked effectively?" },
                        { k: "broke",       q: "What failed or encountered logic blocks?" },
                        { k: "differently", q: "What architectural changes would you do differently?" },
                      ].map(({ k, q }) => (
                        <div key={k}>
                          <label className="block text-xs text-gray-400 mb-1 font-medium">{q}</label>
                          <textarea rows={2} value={form[k]} onChange={e => setForm(f => ({ ...f, [k]: e.target.value }))} placeholder="Document milestones..." className="w-full bg-gray-950 border border-gray-800 text-gray-200 text-sm rounded-lg px-3 py-2 focus:outline-none focus:border-gray-700 resize-none placeholder-gray-800" />
                        </div>
                      ))}

                      <button onClick={saveSession} className="w-full py-2 bg-white text-gray-900 text-sm font-bold rounded-lg hover:bg-gray-100 transition-colors">
                        Save & Commit Session
                      </button>
                    </div>

                    {/* Historical Archives Feed */}
                    <div>
                      <p className="text-xs font-semibold uppercase tracking-widest text-gray-600 mb-3">Committed Run History ({sessions.length})</p>
                      
                      {sessions.length === 0 ? (
                        <div className="flex flex-col items-center py-16 gap-2 text-center border border-dashed border-gray-800 rounded-xl">
                          <span className="text-2xl text-gray-800">❖</span>
                          <p className="text-gray-600 text-sm">No historical log milestones tracked.</p>
                        </div>
                      ) : (
                        <div className="space-y-3">
                          {sessions.map(sess => (
                            <div key={sess.id} className="bg-gray-900 border border-gray-800 rounded-xl p-4 relative">
                              <div className="flex items-start justify-between gap-4 mb-2">
                                <div className="flex items-center gap-2 flex-wrap">
                                  <span className={`text-[10px] font-bold px-2 py-0.5 rounded ${BADGE[sess.brief?.style] ?? "bg-gray-800 text-gray-400"}`}>{sess.brief?.style ?? "Sandbox"}</span>
                                  <span className="text-gray-600 text-xs font-mono">{sess.date}</span>
                                </div>
                                <button onClick={() => deleteSession(sess.id)}
                                  className="text-gray-400 hover:text-red-500 transition-colors text-sm font-semibold"
                                  title="Delete session">
                                  ✕
                                </button>
                              </div>
                              <p className="text-base font-bold text-white tracking-tight leading-tight">{sess.brief?.theme}</p>
                              <p className="text-gray-400 text-xs mt-0.5 mb-3 border-l-2 border-gray-800 pl-2 italic">"{sess.brief?.constraint}"</p>
                              
                              <div className="border-t border-gray-800/60 pt-3 space-y-2.5">
                                {[
                                  { k: "worked",      l: "What Worked" },
                                  { k: "broke",       l: "What Broke" },
                                  { k: "differently", l: "Do Differently" },
                                ].filter(({ k }) => sess[k]).map(({ k, l }) => (
                                  <div key={k} className="text-xs">
                                    <span className="block font-semibold uppercase text-gray-600 tracking-wider text-[10px]">{l}</span>
                                    <p className="text-gray-300 mt-0.5 whitespace-pre-wrap leading-relaxed">{sess[k]}</p>
                                  </div>
                                ))}
                              </div>
                            </div>
                          ))}
                        </div>
                      )}
                    </div>
                  </div>
                )}
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
